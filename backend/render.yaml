services:
  - type: web
    name: textual-sql-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_TYPE
        value: postgresql
      - key: DATABASE_URL
        fromConfig: true
      - key: GROQ_API_KEY
        fromConfig: true
